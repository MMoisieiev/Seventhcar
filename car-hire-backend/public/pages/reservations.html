<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Reservations - Seventh Car Hire</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/reservations.css" />
</head>
<body>
<div id="navbar-placeholder"></div>
<script>
  fetch("/partials/navbar.html")
    .then(r => r.text())
    .then(html => {
      document.getElementById("navbar-placeholder").innerHTML = html;
      const script = document.createElement('script');
      script.src = "/js/navbar.js";
      document.body.appendChild(script);
    });
</script>

<div class="container mt-5">
  <h2 class="mb-4">Manage Reservations</h2>

  <div class="d-flex justify-content-between mb-3">
    <input
      type="text"
      id="searchReservations"
      class="form-control w-50"
      placeholder="Search by name, plate number, or date..."
    />
    <select id="filterStatus" class="form-control w-25">
      <option value="">All Statuses</option>
      <option value="Pending">Pending</option>
      <option value="Approved">Approved</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
    </select>
  </div>

  <div class="button-row">
    <button id="addReservationBtn" class="btn btn-success">Add New Reservation</button>
  </div>

  <div id="tableContainer">
    <table class="table table-bordered table-hover">
      <thead class="thead-dark">
  <tr>
    <th>ID</th>
    <th>Customer</th>
    <th>Phone</th>
    <th>Plate Number</th>
    <th class="sortable" data-sort-key="start_date">Start Date</th>
    <th>Start Time</th>
    <th class="sortable" data-sort-key="end_date">End Date</th>
    <th>End Time</th>
    <th>Extras</th>
    <th>Price</th>
    <th>Status</th>
    <th>Actions</th>
  </tr>

      </thead>
      <tbody id="reservationsTable"></tbody>
    </table>
  </div>

  <div id="availabilityContainer" style="display: none;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <button id="prevMonthBtn" class="btn btn-outline-primary">Previous Month</button>
      <h3 id="calendarMonthYear" class="mb-0"></h3>
      <button id="nextMonthBtn" class="btn btn-outline-primary">Next Month</button>
    </div>
    <div id="calendarGrid" class="row"></div>
  </div>
</div>

<div id="modals-placeholder"></div>
<script>
  fetch("/partials/reservation-modals.html")
    .then(r => r.text())
    .then(html => { document.getElementById("modals-placeholder").innerHTML = html; });
</script>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/partials/pricecalc.js"></script>
<script src="/js/reservation-modals.js"></script>
<script src="/js/reservations.js"></script>
<script src="/js/availabilityCalendar.js"></script>
</body>
</html>
